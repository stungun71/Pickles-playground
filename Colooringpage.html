<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAS BACKWARDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Phase 1: The Raw Materials */
        :root {
            --bg-color: #0A0A0A; /* The Void */
            --card-color: #F2F2F2; /* Harsh White */
            --accent-pink: #FF007F; /* Anarchy Pink */
            --ink: #000000; /* Pure Black */
        }

        body {
            background-color: var(--bg-color);
            color: var(--card-color);
            font-family: 'Space Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Phase 3: The Interaction */
        .brutalist-btn {
            background-color: var(--accent-pink);
            color: var(--ink);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1.5rem;
            text-transform: uppercase;
            padding: 24px 48px;
            
            /* The Architecture: Zero curves, thick borders */
            border: 4px solid var(--ink);
            border-radius: 0px; 
            
            /* The Neo-Brutalist Shadow: Solid, unblurred, offset */
            box-shadow: 8px 8px 0px 0px var(--card-color);
            
            cursor: pointer;
            transition: all 0.1s ease-in-out; /* Lightning fast transition */
        }

        /* Phase 3: The 'Clack' (Hover/Active State) */
        .brutalist-btn:hover {
            /* Physically press the button down and right */
            transform: translate(4px, 4px);
            /* Shrink the shadow to sell the illusion of compression */
            box-shadow: 4px 4px 0px 0px var(--card-color);
        }

        .brutalist-btn:active {
            /* Full compression on click */
            transform: translate(8px, 8px);
            box-shadow: 0px 0px 0px 0px var(--card-color);
            background-color: #e60073; /* Slightly darker pink on click */
        }
    </style>
</head>
<body>

    <button class="brutalist-btn">Buy It (Only If It Works)</button>

</body>
</html>
